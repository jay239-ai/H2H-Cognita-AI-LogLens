<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetPulse - WiFi Experience Intelligence</title>
    <meta name="description"
        content="Real-time WiFi network analyzer with live charts, speed tests, and intelligent diagnostics.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #05070A;
            --bg-card: rgba(15, 23, 42, 0.6);
            --bg-card-solid: #0F172A;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-primary: #F1F5F9;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-card-solid: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: background 0.3s;
        }

        .accent-gradient {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .waveform-container {
            position: relative;
            height: 180px;
            width: 100%;
            overflow: hidden;
            border-radius: 1rem;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .speed-bar {
            transition: width 0.5s ease-out;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .tab-active {
            border-bottom: 2px solid #3B82F6;
            color: #3B82F6;
        }

        .gauge-ring {
            transition: stroke-dashoffset 1s ease-out;
        }

        @keyframes gauge-glow {

            0%,
            100% {
                filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.3));
            }

            50% {
                filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.6));
            }
        }

        .gauge-glow {
            animation: gauge-glow 3s ease-in-out infinite;
        }

        .heatmap-cell {
            transition: background 0.3s;
            border-radius: 3px;
        }

        .anomaly-flash {
            animation: anomalyFlash 1s ease;
        }

        @keyframes anomalyFlash {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5)
            }

            70% {
                box-shadow: 0 0 0 8px rgba(239, 68, 68, 0)
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0)
            }
        }

        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white !important;
                color: black !important;
            }

            .glass {
                background: white !important;
                border: 1px solid #ddd !important;
            }
        }

        @media (max-width: 640px) {
            .mobile-stack {
                flex-direction: column !important;
            }

            .mobile-full {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const API_BASE_URL = window.location.hostname === 'localhost' ? '' : 'https://h2h-cognita-ai-loglens.onrender.com';

        // ─── Persistence ───
        const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { } };
        const load = (k) => { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : null; } catch (e) { return null; } };

        // ─── Notifications + Sound ───
        function requestNotifPerm() { if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); }
        function sendNotif(title, body) { if ('Notification' in window && Notification.permission === 'granted') new Notification(title, { body, icon: '/favicon.svg' }); }

        let audioCtx = null;
        function playAlertSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 440; osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) { }
        }

        // ─── Anomaly Detection ───
        function detectAnomalies(history) {
            if (history.length < 10) return [];
            const recent = history.slice(-30);
            const latencies = recent.map(h => h.latency);
            const mean = latencies.reduce((a, b) => a + b, 0) / latencies.length;
            const std = Math.sqrt(latencies.reduce((s, l) => s + Math.pow(l - mean, 2), 0) / latencies.length);
            const anomalies = [];
            recent.forEach((h, i) => {
                const z = std > 0 ? Math.abs(h.latency - mean) / std : 0;
                if (z > 2) anomalies.push({ index: history.length - recent.length + i, value: h.latency, zScore: z.toFixed(1) });
            });
            return anomalies;
        }

        // ─── Loss Pattern Analysis ───
        function analyzeLossPattern(history) {
            const losses = history.slice(-60).map(h => h.loss > 0 ? 1 : 0);
            if (losses.length < 10) return { pattern: 'Insufficient data', burstCount: 0, randomCount: 0 };
            let bursts = 0, randoms = 0, consecutive = 0;
            for (let i = 0; i < losses.length; i++) {
                if (losses[i]) { consecutive++; }
                else { if (consecutive >= 3) bursts++; else if (consecutive > 0) randoms += consecutive; consecutive = 0; }
            }
            if (consecutive >= 3) bursts++; else if (consecutive > 0) randoms += consecutive;
            const total = bursts + randoms;
            const pattern = total === 0 ? 'No Loss' : bursts > randoms ? 'Burst Loss' : randoms > bursts ? 'Random Loss' : 'Mixed';
            return { pattern, burstCount: bursts, randomCount: randoms };
        }

        // ─── Browser Feature Detection ───
        const HAS_NET_INFO = !!(navigator.connection || navigator.mozConnection || navigator.webkitConnection);
        function getConnAPI() { return navigator.connection || navigator.mozConnection || navigator.webkitConnection || null; }

        // ─── Metrics Collector (Fixed: accurate timing) ───
        async function collectMetrics(url) {
            // Use a CORS-enabled endpoint so Performance Timing API works
            // Cloudflare's /cdn-cgi/trace returns plaintext with CORS headers
            const PING_URL = 'https://www.cloudflare.com/cdn-cgi/trace';
            const pings = [];
            let fails = 0;
            const PING_COUNT = 10; // 1 warm-up + 9 real

            for (let i = 0; i < PING_COUNT; i++) {
                try {
                    const c = new AbortController();
                    const t = setTimeout(() => c.abort(), 1000);
                    const s = performance.now();
                    // Use cors mode so PerformanceResourceTiming has real data
                    await fetch(PING_URL + '?_=' + Date.now() + '_' + i, { signal: c.signal, cache: 'no-store', mode: 'cors' });
                    const elapsed = performance.now() - s;
                    clearTimeout(t);
                    // Discard first ping (warm-up: DNS + TCP + TLS overhead on first request)
                    if (i > 0) pings.push(elapsed);
                } catch (e) { if (i > 0) fails++; }
            }

            const conn = getConnAPI();
            const fetchAvg = pings.length ? pings.reduce((a, b) => a + b, 0) / pings.length : 0;

            // Jitter: mean absolute deviation from the mean (using consistent single target)
            const jitter = pings.length > 1 ? pings.reduce((s, l) => s + Math.abs(l - fetchAvg), 0) / pings.length : 0;
            const packetLoss = pings.length > 0 ? (fails / (PING_COUNT - 1)) * 100 : 0;

            // navigator.connection: use if available, show N/A-safe defaults otherwise
            const navRtt = conn?.rtt ?? null;
            const navDownlink = conn?.downlink ?? null;
            const effectiveType = conn?.effectiveType || (HAS_NET_INFO ? 'unknown' : 'N/A');
            const connectionType = conn?.type || (HAS_NET_INFO ? 'unknown' : 'N/A');

            // Latency: prefer fetch timing (real measurement) over navigator.connection.rtt
            // navigator.connection.rtt is rounded to 25ms increments and often inaccurate
            const latency = fetchAvg;

            // DNS/TLS/TCP from Performance API (works because we use cors mode)
            let dns = 0, tls = 0, tcp = 0;
            try {
                const entries = performance.getEntriesByType('resource');
                const recent = entries.filter(e => e.name.includes('cloudflare.com/cdn-cgi/trace'));
                if (recent.length) {
                    const last = recent[recent.length - 1];
                    dns = Math.max(0, last.domainLookupEnd - last.domainLookupStart);
                    tcp = Math.max(0, last.connectEnd - last.connectStart);
                    tls = last.secureConnectionStart > 0 ? Math.max(0, last.connectEnd - last.secureConnectionStart) : 0;
                }
                if (entries.length > 150) performance.clearResourceTimings();
            } catch (e) { }

            return {
                latency_ms: Math.round(latency * 100) / 100,
                jitter_ms: Math.round(jitter * 100) / 100,
                packet_loss_pct: Math.round(packetLoss * 100) / 100,
                downlink_mbps: navDownlink || 0,
                rtt_ms: navRtt || fetchAvg,
                effective_type: effectiveType,
                connection_type: connectionType,
                dns_ms: Math.round(dns * 100) / 100,
                tls_ms: Math.round(tls * 100) / 100,
                tcp_ms: Math.round(tcp * 100) / 100,
            };
        }

        // ─── Speed Test (Fixed: Cloudflare speed test endpoints) ───
        async function runSpeedTest(url, onP) {
            const r = { download: 0, upload: 0 };

            // === DOWNLOAD: Use Cloudflare's speed test endpoint ===
            onP({ phase: 'download', progress: 0 });
            try {
                // Cloudflare serves random bytes at this endpoint, no caching
                const sizes = [1e5, 1e6, 5e6, 10e6]; // 100KB, 1MB, 5MB, 10MB
                let totalBytes = 0;
                const start = performance.now();
                for (let i = 0; i < sizes.length; i++) {
                    try {
                        const resp = await fetch(`https://speed.cloudflare.com/__down?bytes=${sizes[i]}`, { cache: 'no-store' });
                        const reader = resp.body.getReader();
                        let bytes = 0;
                        while (true) { const { done, value } = await reader.read(); if (done) break; bytes += value.length; }
                        totalBytes += bytes;
                    } catch (e) { }
                    onP({ phase: 'download', progress: ((i + 1) / sizes.length) * 95 });
                }
                const elapsed = (performance.now() - start) / 1000;
                if (elapsed > 0 && totalBytes > 0) {
                    r.download = Math.round(((totalBytes * 8) / (1024 * 1024)) / elapsed * 100) / 100;
                }
                onP({ phase: 'download', progress: 100 });
            } catch (e) { }

            // === UPLOAD: Use Cloudflare's speed test upload endpoint ===
            onP({ phase: 'upload', progress: 0 });
            try {
                const payload = new Uint8Array(2 * 1024 * 1024); // 2MB
                crypto.getRandomValues(payload);
                const start = performance.now();
                await fetch('https://speed.cloudflare.com/__up', {
                    method: 'POST', body: payload,
                    headers: { 'CF-Speed-Test': '1', 'Content-Type': 'application/octet-stream' }
                });
                const elapsed = (performance.now() - start) / 1000;
                if (elapsed > 0) {
                    r.upload = Math.round(((payload.length * 8) / (1024 * 1024)) / elapsed * 100) / 100;
                }
                onP({ phase: 'upload', progress: 100 });
            } catch (e) { }
            onP({ phase: 'done', progress: 100 });
            return r;
        }

        // ─── Components ───
        const QoEGauge = ({ score, label }) => {
            const r = 52, c = 2 * Math.PI * r, o = c - (score / 100) * c, cl = label === 'Good' ? '#10B981' : label === 'Moderate' ? '#F59E0B' : '#EF4444';
            return <div className="flex flex-col items-center"><svg width="120" height="120" className="gauge-glow"><circle cx="60" cy="60" r={r} fill="none" stroke="var(--bg-card-solid)" strokeWidth="8" /><circle cx="60" cy="60" r={r} fill="none" stroke={cl} strokeWidth="8" strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" className="gauge-ring" transform="rotate(-90 60 60)" /><text x="60" y="55" textAnchor="middle" fill={cl} fontSize="26" fontWeight="700" fontFamily="Space Grotesk">{Math.round(score)}</text><text x="60" y="73" textAnchor="middle" fill="var(--text-muted)" fontSize="10" fontWeight="600" fontFamily="Space Grotesk">{label}</text></svg></div>;
        };

        const Sparkline = ({ data, color = '#3B82F6', w = 55, h = 18 }) => {
            if (!data || data.length < 2) return null; const mn = Math.min(...data), mx = Math.max(...data), rg = mx - mn || 1;
            const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - mn) / rg) * h}`).join(' ');
            return <svg width={w} height={h} className="inline-block align-middle"><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" /></svg>;
        };

        const LiveChart = ({ history, field, label, color, unit, anomalies = [] }) => {
            const ref = useRef(null), chart = useRef(null);
            useEffect(() => {
                if (!ref.current) return; if (chart.current) chart.current.destroy(); const ctx = ref.current.getContext('2d');
                chart.current = new Chart(ctx, {
                    type: 'line', data: { labels: [], datasets: [{ label, data: [], borderColor: color, backgroundColor: color + '20', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }] },
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: { duration: 200 }, plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(15,23,42,0.9)', borderColor: color, borderWidth: 1 } },
                        scales: { x: { display: true, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: 'var(--text-muted)', font: { size: 9 }, maxTicksLimit: 6 } }, y: { display: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'var(--text-muted)', font: { size: 10 }, callback: v => `${v}${unit}` }, beginAtZero: true } }
                    }
                });
                return () => { if (chart.current) chart.current.destroy(); };
            }, []);
            useEffect(() => {
                if (!chart.current || !history.length) return; const c = chart.current, s = history.slice(-60);
                c.data.labels = s.map((_, i) => { const t = (s.length - 1 - i) * 3; return t === 0 ? 'now' : `-${t}s`; });
                c.data.datasets[0].data = s.map(h => h[field]);
                // Highlight anomalies with red points
                const aIdx = new Set(anomalies.map(a => a.index));
                c.data.datasets[0].pointRadius = s.map((_, i) => aIdx.has(history.length - s.length + i) ? 5 : 0);
                c.data.datasets[0].pointBackgroundColor = s.map((_, i) => aIdx.has(history.length - s.length + i) ? '#EF4444' : color);
                c.update('none');
            }, [history, anomalies]);
            return <div className="glass rounded-2xl p-4" style={{ height: '180px' }}><div className="flex items-center justify-between mb-2"><div className="flex items-center space-x-2"><div className="w-2 h-2 rounded-full" style={{ background: color }}></div><span className="text-xs uppercase tracking-widest font-bold" style={{ color }}>{label}</span></div><span className="text-xs font-mono" style={{ color: 'var(--text-muted)' }}>{history.length > 0 ? `${Math.round(history[history.length - 1]?.[field] || 0)} ${unit}` : ''}</span></div><div style={{ height: '130px' }}><canvas ref={ref}></canvas></div></div>;
        };

        const SignalCanvas = ({ rssi, jitter, packetLoss }) => {
            const ref = useRef(null);
            useEffect(() => {
                const c = ref.current, ctx = c.getContext('2d'); let id, off = 0;
                const render = () => {
                    ctx.clearRect(0, 0, c.width, c.height); const w = c.width, h = c.height, m = h / 2, a = Math.max(10, (100 + rssi) * 2), j = jitter * 0.05, s = 100 - packetLoss * 10;
                    ctx.beginPath(); ctx.lineWidth = 3; ctx.strokeStyle = `hsla(${210 + (packetLoss * 5)},${s}%,60%,0.8)`;
                    for (let x = 0; x < w; x++) { const f = 0.01 + (jitter * 0.001), t = Math.sin(x * 0.05 + off * 2) * j, y = m + Math.sin(x * f + off) * a + Math.cos(x * f * 2.5 + off * 1.5) * (a / 3) + t; x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); } ctx.stroke(); off += 0.05 + (jitter * 0.002); id = requestAnimationFrame(render);
                };
                render(); return () => cancelAnimationFrame(id);
            }, [rssi, jitter, packetLoss]);
            return <div className="waveform-container glass"><canvas ref={ref} width={800} height={180} /><div className="absolute top-3 left-5 flex items-center space-x-2"><div className={`w-2 h-2 rounded-full bg-blue-500 ${jitter > 20 ? 'pulse' : ''}`}></div><span className="text-xs uppercase tracking-widest text-blue-400 font-bold">Live Signal</span></div></div>;
        };

        const Heatmap = ({ history }) => {
            const cells = history.slice(-60);
            const gc = l => l < 30 ? '#064E3B' : l < 60 ? '#065F46' : l < 100 ? '#92400E' : l < 200 ? '#9A3412' : '#7F1D1D';
            return <div className="glass p-4 rounded-2xl"><div className="flex items-center justify-between mb-2"><div className="flex items-center space-x-2"><div className="w-2 h-2 rounded-full bg-teal-500"></div><span className="text-xs uppercase tracking-widest text-teal-400 font-bold">Latency Heatmap</span></div><div className="flex items-center space-x-1 text-[9px]" style={{ color: 'var(--text-muted)' }}><span>Low</span><div className="flex space-x-0.5">{['#064E3B', '#065F46', '#92400E', '#9A3412', '#7F1D1D'].map((c, i) => <div key={i} className="w-3 h-2 rounded-sm" style={{ background: c }}></div>)}</div><span>High</span></div></div><div className="flex flex-wrap gap-1">{cells.map((h, i) => <div key={i} className="heatmap-cell w-3 h-3" style={{ background: gc(h.latency) }} title={`${h.latency}ms`}></div>)}{cells.length === 0 && <p className="text-xs italic" style={{ color: 'var(--text-muted)' }}>Collecting...</p>}</div></div>;
        };

        // ─── Network Path (Fixed: shows hops in natural order, not sorted) ───
        const TracerouteViz = () => {
            const [hops, setHops] = useState(null), [loading, setLoading] = useState(false);
            const run = async () => {
                setLoading(true);
                // Ordered from closest (edge/CDN) to farthest (origin servers)
                const targets = [
                    { name: 'Cloudflare Edge', url: 'https://www.cloudflare.com/cdn-cgi/trace' },
                    { name: 'Google Edge', url: 'https://www.gstatic.com/generate_204' },
                    { name: 'Google DNS', url: 'https://dns.google/resolve?name=example.com&type=A' },
                    { name: 'Cloudflare DNS', url: 'https://1.1.1.1/cdn-cgi/trace' },
                    { name: 'AWS CloudFront', url: 'https://d1.awsstatic.com/favicon.ico' },
                    { name: 'Microsoft CDN', url: 'https://ajax.aspnetcdn.com/ajax/jquery/jquery-3.7.1.min.js' },
                    { name: 'Fastly Edge', url: 'https://www.fastly.com/favicon.ico' },
                ];
                const results = [];
                for (let i = 0; i < targets.length; i++) {
                    const times = [];
                    // Ping each target 3 times, take median for accuracy
                    for (let j = 0; j < 3; j++) {
                        try {
                            const s = performance.now();
                            await fetch(targets[i].url + '?_=' + Date.now(), { mode: 'no-cors', cache: 'no-store' });
                            times.push(Math.round((performance.now() - s) * 10) / 10);
                        } catch (e) { }
                    }
                    const median = times.length ? times.sort((a, b) => a - b)[Math.floor(times.length / 2)] : -1;
                    results.push({ hop: i + 1, ip: targets[i].name, rtt_ms: median, status: median >= 0 ? 'ok' : 'timeout' });
                }
                // Keep natural order (do NOT sort)
                setHops(results);
                setLoading(false);
            };
            const gc = ms => ms < 30 ? '#10B981' : ms < 100 ? '#3B82F6' : ms < 200 ? '#F59E0B' : '#EF4444';
            return <div className="glass p-6 rounded-3xl"><div className="flex justify-between items-center mb-4"><h3 className="text-lg font-bold flex items-center" style={{ color: 'var(--text-primary)' }}><span className="w-2 h-2 rounded-full bg-green-500 mr-3"></span>Network Path</h3><button onClick={run} disabled={loading} className="px-4 py-2 rounded-xl bg-green-600 hover:bg-green-500 text-white text-sm font-bold transition-all disabled:opacity-50">{loading ? 'Tracing...' : 'Trace'}</button></div>
                {hops ? <div className="space-y-2">{hops.map((h, i) => <div key={i} className="flex items-center space-x-3"><span className="text-xs font-bold w-6" style={{ color: 'var(--text-muted)' }}>{h.hop}</span><div className="flex-1 flex items-center space-x-2"><div className="w-3 h-3 rounded-full" style={{ background: gc(h.rtt_ms) }}></div><div className="flex-1 h-1.5 rounded-full" style={{ background: gc(h.rtt_ms), opacity: 0.2 }}><div className="h-full rounded-full speed-bar" style={{ width: `${Math.min(100, (h.rtt_ms / 300) * 100)}%`, background: gc(h.rtt_ms) }}></div></div></div><span className="text-xs font-medium w-28 truncate" style={{ color: 'var(--text-secondary)' }}>{h.ip}</span><span className="text-xs font-bold w-14 text-right" style={{ color: gc(h.rtt_ms) }}>{h.rtt_ms >= 0 ? `${h.rtt_ms}ms` : 'ERR'}</span></div>)}</div>
                    : <div className="text-center py-4 italic text-sm" style={{ color: 'var(--text-muted)' }}>Trace your network path to global endpoints.</div>}</div>;
        };

        // ─── Stability Score (Fixed: client-side, no backend dependency) ───
        const StabilityScore = ({ history }) => {
            if (history.length < 5) return <div className="glass p-4 rounded-2xl text-center"><p className="text-xs font-bold uppercase tracking-widest mb-1" style={{ color: 'var(--text-muted)' }}>Stability</p><p className="text-lg font-bold" style={{ color: 'var(--text-muted)' }}>...</p><p className="text-xs" style={{ color: 'var(--text-muted)' }}>Collecting</p></div>;
            const recent = history.slice(-30);
            const lats = recent.map(h => h.latency);
            const jits = recent.map(h => h.jitter);
            const losses = recent.map(h => h.loss);
            const mean = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
            const std = arr => { const m = mean(arr); return Math.sqrt(arr.reduce((s, v) => s + Math.pow(v - m, 2), 0) / arr.length); };
            const latCV = mean(lats) > 0 ? (std(lats) / mean(lats)) * 100 : 0;
            const jitCV = mean(jits) > 0 ? (std(jits) / mean(jits)) * 100 : 0;
            const stability = Math.max(0, Math.min(100, 100 - (0.5 * latCV + 0.3 * jitCV + 0.2 * mean(losses) * 10)));
            const label = stability >= 85 ? 'Rock Solid' : stability >= 65 ? 'Stable' : stability >= 40 ? 'Fluctuating' : 'Unstable';

                                <SignalCanvas rssi={current.rssi_dbm} jitter={current.jitter_ms} packetLoss={current.packet_loss_pct} />
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mobile-full">
                                    {[{ l: 'Latency', v: `${Math.round(current.latency_ms)}`, u: 'ms', s: 'RTT', f: 'latency', c: '#3B82F6' }, { l: 'Jitter', v: `${Math.round(current.jitter_ms)}`, u: 'ms', s: 'Variance', f: 'jitter', c: '#8B5CF6' }, { l: 'Loss', v: `${current.packet_loss_pct}`, u: '%', s: 'Packets', f: 'loss', c: '#EF4444' }, { l: 'Downlink', v: `${current.tx_rate_mbps}`, u: 'Mbps', s: current.band, f: 'throughput', c: '#10B981' }].map(st => (
                                        <div key={st.l} className={`glass p-3 rounded-2xl ${anomalies.some(a => st.f === 'latency' && a.index === history.length - 1) ? 'anomaly-flash' : ''}`}><div className="flex justify-between items-start"><p className="text-xs font-bold uppercase tracking-widest mb-1" style={{ color: 'var(--text-muted)' }}>{st.l}</p><Sparkline data={history.slice(-20).map(h => h[st.f])} color={st.c} /></div><div className="flex items-baseline space-x-1"><p className="text-xl font-bold" style={{ color: 'var(--text-primary)' }}>{st.v}</p><p className="text-xs" style={{ color: 'var(--text-muted)' }}>{st.u}</p></div><p className="text-xs font-medium" style={{ color: 'var(--text-muted)' }}>{st.s}</p></div>
                                    ))}
                                </div>
                                <Heatmap history={history} />
                                {anomalies.length > 0 && <div className="glass p-4 rounded-2xl border border-red-500/30"><div className="flex items-center space-x-2 mb-2"><span className="text-red-400 font-bold text-xs uppercase">Anomalies Detected ({anomalies.length})</span></div><div className="flex flex-wrap gap-2">{anomalies.slice(-5).map((a, i) => <span key={i} className="text-xs px-2 py-1 rounded-lg bg-red-500/10 text-red-400">{a.value}ms (z={a.zScore})</span>)}</div></div>}
                                <div className="glass p-5 rounded-3xl"><div className="flex justify-between items-center mb-3"><h3 className="text-lg font-bold" style={{ color: 'var(--text-primary)' }}>WiFi Story</h3><button onClick={fetchStory} disabled={loadingStory} className="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold disabled:opacity-50">{loadingStory ? '...' : 'Analyze'}</button></div><div className="p-4 rounded-2xl border italic leading-relaxed" style={{ background: 'var(--bg-card-solid)', borderColor: 'var(--border)', color: 'var(--text-secondary)' }}>{story}</div></div>
                            </div>
                            <div className="space-y-5">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="glass p-3 rounded-2xl text-center"><p className="text-xs font-bold uppercase tracking-widest mb-1" style={{ color: 'var(--text-muted)' }}>Bandwidth</p><p className="text-lg font-bold" style={{ color: 'var(--text-primary)' }}>{formatBytes(totalBytes)}</p></div>
                                    <StabilityScore history={history} />
                                </div>
                                <LossPattern history={history} />
                                <div className="glass p-5 rounded-3xl"><h3 className="text-lg font-bold mb-3 flex items-center" style={{ color: 'var(--text-primary)' }}><span className="w-2 h-2 rounded-full bg-purple-500 mr-3"></span>App Profiler</h3><div className="space-y-2">{Object.entries(qoe.app_profiles).map(([a, s]) => <div key={a} className="flex justify-between items-center p-2.5 rounded-xl" style={{ background: 'var(--bg-card-solid)' }}><span className="text-sm font-medium" style={{ color: 'var(--text-secondary)' }}>{a}</span><span className={`text-xs font-bold px-3 py-1 rounded-lg ${['Excellent', 'Fluid', 'Stable'].includes(s) ? 'bg-emerald-500/10 text-emerald-400' : 'bg-orange-500/10 text-orange-400'}`}>{s}</span></div>)}</div></div>
                                <div className="glass p-5 rounded-3xl"><h3 className="text-lg font-bold mb-3 flex items-center" style={{ color: 'var(--text-primary)' }}><span className="w-2 h-2 rounded-full bg-red-500 mr-3"></span>Root Causes</h3><div className="space-y-2">{causes.length > 0 ? causes.map((c, i) => <div key={i} className="p-3 rounded-xl bg-red-500/5 border border-red-500/20"><p className="text-red-400 font-bold text-sm mb-1">{c.type}</p><p className="text-xs mb-2" style={{ color: 'var(--text-secondary)' }}>{c.evidence}</p><div className="p-2 rounded-lg text-xs text-emerald-400 border border-emerald-500/20" style={{ background: 'var(--bg-card-solid)' }}><span className="font-bold mr-1 uppercase">Fix:</span>{c.mitigation}</div></div>) : <div className="text-center py-4"><p className="text-emerald-400 text-sm font-medium">All clear</p></div>}</div></div>
                                <Recommendations data={data} />
                                <NetworkInfo />
                                <PerfTiming timing={lastMetrics} />
                                <Timeline events={events} />
                            </div>
                        </div>)}

                    {activeTab === 'charts' && (<div className="space-y-5"><div className="grid grid-cols-1 md:grid-cols-2 gap-5"><LiveChart history={history} field="latency" label="Latency" color="#3B82F6" unit="ms" anomalies={anomalies} /><LiveChart history={history} field="jitter" label="Jitter" color="#8B5CF6" unit="ms" /><LiveChart history={history} field="loss" label="Packet Loss" color="#EF4444" unit="%" /><LiveChart history={history} field="qoe" label="QoE Score" color="#10B981" unit="%" /></div><Heatmap history={history} />{anomalies.length > 0 && <div className="glass p-4 rounded-2xl"><p className="text-xs font-bold text-red-400 uppercase mb-2">Latency Anomalies ({anomalies.length} detected)</p><div className="flex flex-wrap gap-2">{anomalies.map((a, i) => <span key={i} className="text-xs px-2 py-1 rounded bg-red-500/10 text-red-400">{a.value}ms (z-score: {a.zScore})</span>)}</div></div>}</div>)}

                    {activeTab === 'tools' && (<div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                        <SpeedTest /><MultiPing /><TracerouteViz />
                        {/* Session Compare */}
                        <div className="glass p-6 rounded-3xl"><div className="flex justify-between items-center mb-4"><h3 className="text-lg font-bold flex items-center" style={{ color: 'var(--text-primary)' }}><span className="w-2 h-2 rounded-full bg-violet-500 mr-3"></span>Session History</h3><button onClick={saveCurrentSession} className="px-4 py-2 rounded-xl bg-violet-600 hover:bg-violet-500 text-white text-sm font-bold">Save Session</button></div>
                            {savedSessions.length > 0 ? <div className="space-y-2">{savedSessions.slice(-5).reverse().map((s, i) => <div key={i} className="flex justify-between items-center p-3 rounded-xl" style={{ background: 'var(--bg-card-solid)' }}><div><p className="text-xs font-medium" style={{ color: 'var(--text-secondary)' }}>{s.date}</p><p className="text-xs" style={{ color: 'var(--text-muted)' }}>{s.samples} samples</p></div><div className="text-right"><p className="text-sm font-bold" style={{ color: 'var(--text-primary)' }}>{s.avgQoE}% QoE</p><p className="text-xs" style={{ color: 'var(--text-muted)' }}>{s.avgLatency}ms avg</p></div></div>)}</div> : <div className="text-center py-4 text-sm italic" style={{ color: 'var(--text-muted)' }}>No saved sessions yet.</div>}</div>

                        {/* Simulator */}
                        <div className="glass p-6 rounded-3xl lg:col-span-2"><div className="flex justify-between items-center mb-5"><h3 className="text-lg font-bold flex items-center" style={{ color: 'var(--text-primary)' }}><span className="w-2 h-2 rounded-full bg-blue-500 mr-3"></span>"What If" Simulator</h3><button onClick={() => setIsSimulating(!isSimulating)} className={`px-4 py-2 rounded-xl text-sm font-bold ${isSimulating ? 'bg-red-500 hover:bg-red-400' : 'bg-blue-600 hover:bg-blue-500'} text-white`}>{isSimulating ? 'Exit' : 'Simulate'}</button></div>
                            {isSimulating ? <div className="space-y-5"><div className="grid grid-cols-1 md:grid-cols-3 gap-5">{[{ l: 'Latency (ms)', k: 'latency', mx: 500 }, { l: 'Jitter (ms)', k: 'jitter', mx: 100 }, { l: 'Loss (%)', k: 'loss', mx: 20 }].map(p => <div key={p.k} className="space-y-2"><div className="flex justify-between"><label className="text-xs uppercase font-bold" style={{ color: 'var(--text-muted)' }}>{p.l}</label><span className="text-xs text-blue-400 font-bold">{simParams[p.k]}</span></div><input type="range" min={0} max={p.mx} value={simParams[p.k]} onChange={e => setSimParams({ ...simParams, [p.k]: parseFloat(e.target.value) })} className="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500" /></div>)}</div><div className="p-5 rounded-2xl bg-blue-500/5 border border-blue-500/20 flex items-center justify-between"><div><p className="text-xs uppercase font-bold mb-1" style={{ color: 'var(--text-muted)' }}>Predicted</p><p className={`text-2xl font-bold ${simQoE?.label === 'Good' ? 'text-emerald-400' : 'text-orange-400'}`}>{simQoE?.label} ({Math.round(simQoE?.score || 0)}%)</p></div></div></div> : <div className="text-center py-4 italic text-sm" style={{ color: 'var(--text-muted)' }}>Predict quality under different conditions.</div>}</div>
                    </div>)}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>

</html>
